name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'dist/**'

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./public_html
        run: npm install

      - name: Build Vite app
        working-directory: ./public_html
        run: npm run build

      - name: Commit dist to main branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          rm -rf dist
          mv public_html/dist dist
          git add dist/
          git commit -m "Build: update dist output" || echo "No changes to commit"
          git push
