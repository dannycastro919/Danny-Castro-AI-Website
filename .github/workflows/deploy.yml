name: Build and Deploy to cPanel

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./public_html
        run: npm install

      - name: Build Vite app
        working-directory: ./public_html
        run: npm run build

      - name: Deploy dist to gh-deploy branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public_html/dist
          publish_branch: gh-deploy
          force_orphan: true
